name: Continuous Flatpak Builder

on:
  schedule:
    - cron: "0 0 * * *"    # Every day at Midnight
  workflow_dispatch:
    inputs:
      test_package:
        description: 'Test a single package by its nixpkgs name (leave blank for standard loop)'
        required: false
        type: string
      architecture:
        description: 'Manual Override (default runs both)'
        required: true
        default: 'both'
        type: choice
        options: [both, x86_64-linux, aarch64-linux]
      skip_update:
        description: 'Skip updating discovered.json list'
        type: boolean
        default: false

concurrency:
  group: flatpak-conveyor-${{ github.event.inputs.test_package || github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: WEEKLY DISCOVERY ────────────────────────────────────────────────
  update-list:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_update == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Fetch nix-index
        run: |
          mkdir -p ~/.cache/nix-index
          curl -L https://github.com/nix-community/nix-index-database/releases/latest/download/index-x86_64-linux -o ~/.cache/nix-index/files
      - name: Build scanner
        run: nix build .#scanner -o result-scanner
      - name: Run Discover
        run: ./result-scanner/bin/scanner discover
      - name: Commit discovered.json
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git add discovered.json
          git commit -m "chore: update discovered.json" && git push || echo "No changes."

  # ── JOB 2: CONVEYOR BELT (PARALLEL) ────────────────────────────────────────
  # 4 runners per architecture = 8 runners total (well within the 20-runner free limit).
  #
  # Partition of the aa-zz namespace (676 combos) across runners 1-3 (225+225+226):
  #   runner 1: aa–iq  (indices   0-224)
  #   runner 2: ir–rh  (indices 225-449)
  #   runner 3: ri–zz  (indices 450-675)
  #   runner 4: everything else (_0, a-, z8, single-char names, etc.)
  #
  # Each runner maintains its own state bookmark (github_runners_state/) and its
  # own failed-apps shard (failed_apps/{arch}/runner{N}.txt) on OneDrive, so
  # runners never conflict. The merge-failed-apps job below combines all shards
  # into the final failed_apps_{system}.txt files after all runners finish.
  conveyor-belt:
    needs: [update-list]
    if: ${{ !cancelled() && (needs.update-list.result == 'success' || needs.update-list.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        # This setup spawns TWO parallel runners
        system: [x86_64-linux, aarch64-linux]
        runner_id: [1, 2, 3, 4]
        exclude:
          # Handle manual overrides from workflow_dispatch.
          # Excluding by system alone drops all runner_id combinations for that arch.
          - system: >-
              ${{ github.event.inputs.architecture == 'aarch64-linux' && 'x86_64-linux' || '' }}
          - system: >-
              ${{ github.event.inputs.architecture == 'x86_64-linux' && 'aarch64-linux' || '' }}

    # Use native ARM for ARM, standard for x86
    runs-on: ${{ matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    permissions:
      contents: read
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      NIXPKGS_ALLOW_BROKEN: 1
      NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          root-safe-haven: '15360'

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Rclone Config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Fix Ubuntu Runner for Nix Flatpak
        run: |
          # 1. Disable Ubuntu AppArmor restrictions on bubblewrap sandboxing
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          
          sudo mkdir -p /var/lib/flatpak/repo
          sudo chown $USER:$USER /var/lib/flatpak/repo
          nix run nixpkgs#ostree -- init --mode=bare-user-only --repo=/var/lib/flatpak/repo

      - name: Build Scanner Utility
        run: nix build .#scanner -o result-scanner

      - name: Set Target Package (If requested)
        if: ${{ github.event.inputs.test_package != '' }}
        run: echo "TARGET_PACKAGE=${{ github.event.inputs.test_package }}" >> $GITHUB_ENV

      - name: Run Conveyor Belt (${{ matrix.system }} / runner ${{ matrix.runner_id }})
        run: |
          ./result-scanner/bin/scanner build-ci \
            --system ${{ matrix.system }} \
            --remote "OneDriveISCTE:nixpkgs2flatpak" \
            --runner-id ${{ matrix.runner_id }}

  # ── JOB 3: MERGE FAILED-APPS SHARDS ───────────────────────────────────────
  # After all conveyor-belt runners finish (or time out), collect the per-runner
  # shard files from OneDrive and merge them into the canonical
  # failed_apps_{system}.txt files.  Runs even if some runners failed so we
  # always get an up-to-date picture of what's broken.
  merge-failed-apps:
    needs: [conveyor-belt]
    if: ${{ !cancelled() && needs.conveyor-belt.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: sudo apt-get install -y rclone

      - name: Setup Rclone Config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Download per-runner shard files from OneDrive
        run: |
          mkdir -p failed_apps/x86 failed_apps/aarch64
          rclone copy "OneDriveISCTE:nixpkgs2flatpak/failed_apps/x86/"     failed_apps/x86/     --include "runner*.txt" || true
          rclone copy "OneDriveISCTE:nixpkgs2flatpak/failed_apps/aarch64/" failed_apps/aarch64/ --include "runner*.txt" || true

      - name: Merge shards into final lists
        run: |
          # Concatenate all shards, sort and deduplicate, produce the canonical file.
          # `|| true` keeps the step green if no shards exist yet (first-ever run).
          cat failed_apps/x86/runner*.txt     2>/dev/null | sort -u > failed_apps_x86_64-linux.txt  || true
          cat failed_apps/aarch64/runner*.txt 2>/dev/null | sort -u > failed_apps_aarch64-linux.txt || true
          echo "x86_64-linux failures:  $(wc -l < failed_apps_x86_64-linux.txt)"
          echo "aarch64-linux failures: $(wc -l < failed_apps_aarch64-linux.txt)"

      - name: Upload merged lists to OneDrive
        run: |
          rclone copyto failed_apps_x86_64-linux.txt  "OneDriveISCTE:nixpkgs2flatpak/failed_apps_x86_64-linux.txt"
          rclone copyto failed_apps_aarch64-linux.txt "OneDriveISCTE:nixpkgs2flatpak/failed_apps_aarch64-linux.txt"