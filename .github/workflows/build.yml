name: Continuous Flatpak Builder

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Override: Architecture to build'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - x86_64-linux
          - aarch64-linux

concurrency:
  group: flatpak-conveyor
  cancel-in-progress: false

jobs:
  decide-arch:
    runs-on: ubuntu-latest
    outputs:
      system: ${{ steps.pick.outputs.system }}
      os: ${{ steps.pick.outputs.os }}
    steps:
      - id: pick
        run: |
          INPUT_ARCH="${{ github.event.inputs.architecture }}"
          
          if [ "$INPUT_ARCH" = "x86_64-linux" ]; then
            echo "system=x86_64-linux" >> $GITHUB_OUTPUT
            echo "os=ubuntu-latest" >> $GITHUB_OUTPUT
          elif [ "$INPUT_ARCH" = "aarch64-linux" ]; then
            echo "system=aarch64-linux" >> $GITHUB_OUTPUT
            echo "os=ubuntu-24.04-arm" >> $GITHUB_OUTPUT
          else
            # AUTO MODE: Even day of year = x86, Odd day = ARM
            DAY_OF_YEAR=$(date +%-j)
            if [ $((DAY_OF_YEAR % 2)) -eq 0 ]; then
              echo "system=x86_64-linux" >> $GITHUB_OUTPUT
              echo "os=ubuntu-latest" >> $GITHUB_OUTPUT
            else
              echo "system=aarch64-linux" >> $GITHUB_OUTPUT
              echo "os=ubuntu-24.04-arm" >> $GITHUB_OUTPUT
            fi
          fi

  conveyor-belt:
    needs: decide-arch
    runs-on: ${{ needs.decide-arch.outputs.os }}
    permissions:
      contents: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      NIXPKGS_ALLOW_BROKEN: 1
      NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Free up disk space
        uses: wimpysworld/nothing-but-nix@main
        
      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Rclone Config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Build Scanner Utility
        run: nix build .#scanner -o result-scanner

      - name: Run Conveyor Belt (${{ needs.decide-arch.outputs.system }})
        run: |
          ./result-scanner/bin/scanner build-ci \
            --system ${{ needs.decide-arch.outputs.system }} \
            --remote "OneDriveISCTE:nixpkgs2flatpak" \
            --state-file "state-${{ needs.decide-arch.outputs.system }}.json"

      - name: Commit Conveyor State
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git add state-${{ needs.decide-arch.outputs.system }}.json
          git commit -m "chore: update ${{ needs.decide-arch.outputs.system }} state" || exit 0
          for i in {1..10}; do
            git pull --rebase origin main && git push && break || sleep 15
          done