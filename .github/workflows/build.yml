name: Continuous Flatpak Builder

on:
  schedule:
    - cron: "0 0 * * *"    # Every day at Midnight
  workflow_dispatch:
    inputs:
      test_package:
        description: 'Test a single package by its nixpkgs name (leave blank for standard loop)'
        required: false
        type: string
      architecture:
        description: 'Manual Override (default runs both)'
        required: true
        default: 'both'
        type: choice
        options: [both, x86_64-linux, aarch64-linux]
      skip_update:
        description: 'Skip updating discovered.json list'
        type: boolean
        default: false

concurrency:
  group: flatpak-conveyor-${{ github.event.inputs.test_package || github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: WEEKLY DISCOVERY ────────────────────────────────────────────────
  update-list:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_update == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Fetch nix-index
        run: |
          mkdir -p ~/.cache/nix-index
          curl -L https://github.com/nix-community/nix-index-database/releases/latest/download/index-x86_64-linux -o ~/.cache/nix-index/files
      - name: Build scanner
        run: nix build .#scanner -o result-scanner
      - name: Run Discover
        run: ./result-scanner/bin/scanner discover
      - name: Commit discovered.json
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git add discovered.json
          git commit -m "chore: update discovered.json" && git push || echo "No changes."

  # ── JOB 2: CONVEYOR BELT (PARALLEL) ────────────────────────────────────────
  conveyor-belt:
    needs: [update-list]
    if: ${{ !cancelled() && (needs.update-list.result == 'success' || needs.update-list.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        # This setup spawns TWO parallel runners
        system: [x86_64-linux, aarch64-linux]
        exclude:
          # Handle manual overrides from workflow_dispatch
          - system: >-
              ${{ github.event.inputs.architecture == 'aarch64-linux' && 'x86_64-linux' || '' }}
          - system: >-
              ${{ github.event.inputs.architecture == 'x86_64-linux' && 'aarch64-linux' || '' }}

    # Use native ARM for ARM, standard for x86
    runs-on: ${{ matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    permissions:
      contents: read
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      NIXPKGS_ALLOW_BROKEN: 1
      NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          root-safe-haven: '15360'

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Rclone Config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Fix Ubuntu Runner for Nix Flatpak
        run: |
          # 1. Disable Ubuntu 24.04 AppArmor restrictions on bubblewrap sandboxing
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          
          # 2. Create an empty system repo directory so Flatpak doesn't crash scanning it
          sudo mkdir -p /var/lib/flatpak/repo

      - name: Build Scanner Utility
        run: nix build .#scanner -o result-scanner

      - name: Set Target Package (If requested)
        if: ${{ github.event.inputs.test_package != '' }}
        run: echo "TARGET_PACKAGE=${{ github.event.inputs.test_package }}" >> $GITHUB_ENV

      - name: Run Conveyor Belt (${{ matrix.system }})
        run: |
          ./result-scanner/bin/scanner build-ci \
            --system ${{ matrix.system }} \
            --remote "OneDriveISCTE:nixpkgs2flatpak"