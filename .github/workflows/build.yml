name: Continuous Flatpak Builder

on:
  schedule:
    - cron: "0 0 * * *"  # Wakes up every day at Midnight
  workflow_dispatch:     # Allows you to trigger it manually via the GH UI

concurrency:
  group: flatpak-conveyor
  cancel-in-progress: false # Do not cancel in progress, we want it running

jobs:
  conveyor-belt:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            os: ubuntu-latest
          - system: aarch64-linux
            os: ubuntu-24.04-arm   # GitHub's new native free ARM runner!
            
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Free up disk space for Nix
        uses: wimpysworld/nothing-but-nix@main
        
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: 604800

      - name: Setup OS Dependencies (Rclone, Flatpak, FUSE)
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone flatpak fuse3
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Build Scanner Utility
        run: nix build .#scanner -o result-scanner

      - name: Run Conveyor Belt
        # Mounts OneDrive, builds flatpaks, and updates the OSTree repo directly
        run: |
          ./result-scanner/bin/scanner build-ci \
            --system ${{ matrix.system }} \
            --remote "OneDriveISCTE:nixpkgs2flatpak" \
            --state "state-${{ matrix.system }}.json"

      - name: Commit Conveyor State
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git add state-${{ matrix.system }}.json
          git commit -m "chore: update ${{ matrix.system }} state" || exit 0
          
          # Retry push up to 10 times to prevent git push conflicts if x86 and ARM finish simultaneously
          for i in {1..10}; do
            git pull --rebase origin main
            if git push; then
              break
            fi
            sleep $((RANDOM % 15 + 5))
          done